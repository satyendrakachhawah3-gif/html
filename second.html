<!doctype html>
<!-- This tells the browser that the document is an HTML5 document-->
<html>
  <!-- This is the root element of all HTML pages -->
  <head>
    <!-- This head tag contain all the meta information about the HTML document-->
    <title>Html boilerplate</title>
    <!-- This title tag contain the title of the HTML document-->
  </head>

  <body>
    <!-- This body tag contain all the visible content of the HTML document-->
    Hello hhtml 5 documents
  </body>
</html>
