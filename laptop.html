<!doctype html>
<html>
  <head>
    <title>Laptop Store</title>
  </head>
  <body>
    <h1 align="center">💻 Laptop Store</h1>
    <hr />

    <h2>Available Laptops</h2>

    <table border="1" cellpadding="10">
      <tr>
        <th>Laptop Name</th>
        <th>Brand</th>
        <th>Price</th>
        <th>Buy</th>
      </tr>

      <tr>
        <td>Inspiron 15</td>
        <td>Dell</td>
        <td>₹55,000</td>
        <td><button>Buy Now</button></td>
      </tr>

      <tr>
        <td>Pavilion 14</td>
        <td>HP</td>
        <td>₹60,000</td>
        <td><button>Buy Now</button></td>
      </tr>

      <tr>
        <td>IdeaPad Slim 5</td>
        <td>Lenovo</td>
        <td>₹58,000</td>
        <td><button>Buy Now</button></td>
      </tr>

      <tr>
        <td>MacBook Air M3</td>
        <td>Apple</td>
        <td>₹1,10,000</td>
        <td><button>Buy Now</button></td>
      </tr>

      <tr>
        <td>Vivobook 15</td>
        <td>ASUS</td>
        <td>₹52,000</td>
        <td><button>Buy Now</button></td>
      </tr>
    </table>

    <hr />

    <h2>Customer Details</h2>

    <form>
      <label>Customer Name:</label><br />
      <input type="text" placeholder="Enter your name" /><br /><br />

      <label>Email:</label><br />
      <input type="email" placeholder="Enter your email" /><br /><br />

      <label>Phone Number:</label><br />
      <input type="tel" placeholder="Enter your phone number" /><br /><br />

      <label>Select Laptop:</label><br />
      <select>
        <option>Dell Inspiron 15</option>
        <option>HP Pavilion 14</option>
        <option>Lenovo IdeaPad Slim 5</option>
        <option>Apple MacBook Air M3</option>
        <option>ASUS Vivobook 15</option></select
      ><br /><br />

      <input type="submit" value="Place Order" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
