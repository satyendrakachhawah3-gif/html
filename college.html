<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Admission Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f2f2f2;
        padding: 20px;
      }

      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #003366;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        margin-bottom: 20px;
        color: #666;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .row {
        display: flex;
        gap: 15px;
      }

      .row .form-group {
        flex: 1;
      }

      .gender {
        display: flex;
        gap: 20px;
        margin-top: 8px;
      }

      .gender input {
        width: auto;
      }

      button {
        width: 100%;
        background: #003366;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #0055aa;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>ABC College Admission Form</h1>
      <p class="subtitle">Academic Session 2026-27</p>

      <form>
        <div class="row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" required />
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required />
          </div>

          <div class="form-group">
            <label>Gender</label>
            <div class="gender">
              <label><input type="radio" name="gender" /> Male</label>
              <label><input type="radio" name="gender" /> Female</label>
              <label><input type="radio" name="gender" /> Other</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" required />
        </div>

        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" required />
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea rows="4"></textarea>
        </div>

        <div class="row">
          <div class="form-group">
            <label>State</label>
            <input type="text" />
          </div>

          <div class="form-group">
            <label>City</label>
            <input type="text" />
          </div>
        </div>

        <div class="form-group">
          <label>Course Applying For</label>
          <select required>
            <option>Select Course</option>
            <option>BCA</option>
            <option>B.Tech</option>
            <option>BBA</option>
            <option>B.Com</option>
            <option>B.Sc</option>
            <option>MCA</option>
            <option>MBA</option>
          </select>
        </div>

        <div class="form-group">
          <label>12th Percentage</label>
          <input type="number" step="0.01" />
        </div>

        <div class="form-group">
          <label>Upload Passport Size Photo</label>
          <input type="file" />
        </div>

        <div class="form-group">
          <label>Upload 10th Marksheet</label>
          <input type="file" />
        </div>

        <div class="form-group">
          <label>Upload 12th Marksheet</label>
          <input type="file" />
        </div>

        <button type="submit">Submit Admission Form</button>
      </form>
    </div>
  </body>
</html>
