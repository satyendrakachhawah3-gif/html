<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Card Generator</title>
    <link rel="stylesheet" href="random_card.css" />
  </head>
  <body>
    <div class="container">
      <div class="card" id="cardElement">
        <div class="loader">
          <div class="spinner"></div>
        </div>
        <!-- Added crossorigin="anonymous" to allow html2canvas to read the image -->
        <img
          src=""
          alt="Random Gallery Image"
          class="card-img"
          id="cardImage"
          crossorigin="anonymous"
        />
        <div class="card-content">
          <h2 class="card-title">Cards Design</h2>
          <p class="card-text" id="cardText">Loading text...</p>
        </div>
      </div>

      <div class="actions">
        <button class="btn-refresh" id="refreshBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path
              d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
            ></path>
          </svg>
          Refresh Card
        </button>
        <button class="btn-download" id="downloadBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download
        </button>
      </div>

      <div class="credit">Powered by junior Mern Stack Developer</div>
    </div>

    <!-- html2canvas for downloading the card -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Our custom script -->
    <script src="random_card.js"></script>
  </body>
</html>
