<!doctype html>
<html lang="en">
  <head>
    <title>Tables</title>
  </head>
  <body>
    <table border="2">
      <thead>
        <th>No</th>
        <th>Full Name</th>
        <th>Position</th>
        <th>Salary</th>
        <th>Type</th>
      </thead>

      <tbody>
        <tr>
          <th>1</th>
          <td>Bill gates</td>
          <td>Founder Microsoft</td>
          <td>$100</td>
          <td rowspan="4">Company Founder</td>
        </tr>
        <tr>
          <th>2</th>
          <td>Steve Jobs</td>
          <td>Founder Apple</td>
          <td>$1200</td>
        </tr>
        <tr>
          <th>3</th>
          <td>Larry page</td>
          <td>Founder Google</td>
          <td>$1300</td>
        </tr>
        <tr>
          <th>4</th>
          <td>Mark</td>
          <td>Founder Facebook</td>
          <td>$1400</td>
        </tr> 
        <tfoot>
            <tr>
                <td colspan="3">Total Expense</td>
                <td>$4600</td>
            </tr>
        </tfoot>
      </tbody>
    </table>
  </body>
</html>
