<!doctype html>
<html lang="en">
  <head>
    <title>Form information</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>information</legend>
        <label for="date picker">Enter your birthdate</label>
        <input type="date" id="date picker" />
        <br />
        <br />
        <label for="college">Choose your college</label>
        <select name="Cources" id="college" multiple>
          <option value="NITTTR">NITTTR</option>
          <option value="IIT">IIT</option>
          <option value="NIT">NIT</option>
          <option value="IIIT">IIIT</option>
          <option value="JNTU">JNTU</option>
        </select>
        <br />
        <br />
        <button>Click Me</button>
        <br />
        <br />
        <label for="feedback">Enter your feedback</label>
        <textarea
          name="feedback"
          id="feedback"
          rows="30"
          cols="50"
          placeholder="enter feedback...."
        ></textarea>
      </fieldset>
    </form>
  </body>
</html>
